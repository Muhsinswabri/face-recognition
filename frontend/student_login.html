<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Attendance System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ static_asset_url('css/style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div id="customAlert"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-panel p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-graduate role-icon mb-3" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold text-white">Student Login</h2>
                        <p class="text-muted">Enter Student ID Number</p>
                    </div>

                    <form id="studentLoginForm">
                        <div class="mb-4">
                            <label class="form-label text-muted">Student ID</label>
                            <input type="text" class="form-control text-center fs-4 fw-bold py-3" id="studentId" placeholder="e.g. S123" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary-custom">View Analytics</button>
                            <a href="/" class="btn btn-link text-muted mt-2 text-decoration-none">Back to Role Selection</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ static_asset_url('js/main.js') }}"></script>
</body>
</html>
